    <script>
      try {
        const returnView =
          sessionStorage.getItem("leehyeon:coupangReturnView") ||
          localStorage.getItem("leehyeon:coupangReturnView");
        const pageVisited =
          sessionStorage.getItem("leehyeon:coupangPageVisited") ||
          localStorage.getItem("leehyeon:coupangPageVisited");
        const leftAt = Number(
          sessionStorage.getItem("leehyeon:coupangLeftAt") ||
            localStorage.getItem("leehyeon:coupangLeftAt") ||
            0
        );
        const reportRaw =
          sessionStorage.getItem("leehyeon:v2:lastReport") ||
          localStorage.getItem("leehyeon:v2:lastReport");
        const report = reportRaw ? JSON.parse(reportRaw) : null;
        const now = Date.now();
        const freshDeparture =
          returnView === "premium" &&
          pageVisited === "1" &&
          Number.isFinite(leftAt) &&
          leftAt > 0 &&
          now - leftAt <= 10 * 60 * 1000;
        const freshReport =
          report &&
          report.version === "v2-report-v1" &&
          report.payload &&
          report.payload.ok &&
          Number.isFinite(Number(report.savedAt)) &&
          now - Number(report.savedAt) <= 10 * 60 * 1000;
        if (freshDeparture && freshReport) {
          document.documentElement.classList.add("is-restoring-premium");
        }
      } catch (_error) {}
    </script>

      <section class="screen screen-home" data-screen="home" aria-label="사주 정보 입력">

          <div class="hero-orbit" aria-hidden="true">
            <i></i><i></i><i></i><i></i><i></i>
          </div>
          <p class="eyebrow">사주 유형 검사</p>
          <h1>
            <span>당신의 사주 유형을</span>
            <span>확인하세요</span>
          </h1>
          <p class="hero-copy">당신의 사주를 영역별 세부 유형으로 나누어 분석해 드립니다.</p>
        </header>

        <form id="birth-form" class="v2-form">
          <h2>분석에 필요한 정보를 입력하세요.</h2>
          <p>생년월일과 출생 시간을 기준으로 사주 유형과 분야별 흐름을 정리합니다.</p>

          <label class="field" for="nickname-input">
            <span>이름 또는 닉네임</span>
            <input id="nickname-input" name="nickname" type="text" placeholder="예: 이현" autocomplete="name" />
          </label>

          <div class="field">
            <span>성별</span>
            <div class="segmented" role="radiogroup" aria-label="성별">
              <label><input type="radio" name="gender" value="male" checked /><span>남성</span></label>
              <label><input type="radio" name="gender" value="female" /><span>여성</span></label>
            </div>
          </div>

          <label class="field" for="birth-date-input">
            <span>생년월일</span>
            <input id="birth-date-input" name="birthDate" type="text" inputmode="numeric" placeholder="예: 19990101" required />
          </label>

          <div class="field">
            <label for="birth-time-select">출생 시간</label>
            <select id="birth-time-select" name="birthTime" required>
              <option value="" disabled selected>시간 선택</option>
              <option value="unknown">시간 모름</option>
              <option value="ja">자시 (23:30~01:30)</option>
              <option value="chuk">축시 (01:30~03:30)</option>
              <option value="in">인시 (03:30~05:30)</option>
              <option value="myo">묘시 (05:30~07:30)</option>
              <option value="jin">진시 (07:30~09:30)</option>
              <option value="sa">사시 (09:30~11:30)</option>
              <option value="o">오시 (11:30~13:30)</option>
              <option value="mi">미시 (13:30~15:30)</option>
              <option value="sin">신시 (15:30~17:30)</option>
              <option value="yu">유시 (17:30~19:30)</option>
              <option value="sul">술시 (19:30~21:30)</option>
              <option value="hae">해시 (21:30~23:30)</option>
            </select>
          </div>

          <input type="hidden" name="calendarType" value="solar" />
          <input type="hidden" name="tier" value="public_mvp" />
          <input type="hidden" name="relationshipStatus" value="unknown" />
          <input type="hidden" name="targetYear" value="2026" />

          <button class="gold-button" type="submit">사주 유형 검사 시작하기</button>
          <p class="input-trust-note">
